services:
  - type: web
    name: meetapp
    runtime: node
    rootDir: server
    buildCommand: npm run render-build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false          # You will paste this in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure secret
